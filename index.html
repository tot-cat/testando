<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#7C3AED;--v2:#A855F7;--v3:#C084FC;
  --c:#06B6D4;--c2:#22D3EE;
  --dark:#06040F;--darker:#030208;--card:#0D0A1A;--card2:#110E1F;
  --border:rgba(124,58,237,0.2);--text:#F0ECF8;--muted:#7B7394;--success:#10B981;
}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img{max-width:100%;height:auto}
[role="img"]{display:block}

.topbar{background:linear-gradient(90deg,var(--v),var(--v2),var(--c));text-align:center;padding:12px 16px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;color:#fff;letter-spacing:0.05em;position:relative;overflow:hidden}
.topbar::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.1) 50%,transparent 100%);animation:shine 3s infinite}

nav{position:sticky;top:0;z-index:300;background:rgba(6,4,15,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:72px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.logo{display:flex;align-items:center;gap:12px}
.logo-badge{background:linear-gradient(135deg,var(--v),var(--c));color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:0.85rem;padding:8px 14px;border-radius:8px;letter-spacing:0.04em;box-shadow:0 4px 12px rgba(124,58,237,0.3)}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;line-height:1.2}
.logo-text span{color:var(--v3);display:block;font-size:0.65rem;letter-spacing:0.15em;font-weight:600;text-transform:uppercase;margin-top:2px}
.nav-btn{background:linear-gradient(135deg,var(--v),var(--v2));color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;letter-spacing:0.06em;text-transform:uppercase;padding:12px 28px;border-radius:8px;text-decoration:none;transition:all 0.25s;white-space:nowrap;box-shadow:0 4px 20px rgba(124,58,237,0.4);position:relative;overflow:hidden}
.nav-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);transition:transform 0.4s}
.nav-btn:hover::before{transform:translateX(100%)}
.nav-btn:hover{opacity:0.95;transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.6)}

.hero{background:var(--darker);padding:100px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(124,58,237,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.04) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 85% 75% at 50% 0%,black 25%,transparent 85%);pointer-events:none;opacity:0.7}
.hero-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.2) 0%,rgba(6,182,212,0.1) 50%,transparent 70%);top:-250px;left:50%;transform:translateX(-50%);pointer-events:none;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0px)}50%{transform:translateX(-50%) translateY(-20px)}}
.hero-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--v),var(--c),transparent);animation:line 4s infinite}
@keyframes line{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:center}100%{transform:scaleX(0);transform-origin:right}}
@keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.date-badge{display:inline-flex;align-items:center;gap:12px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);color:var(--v3);font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:12px 24px;border-radius:100px;margin-bottom:32px;position:relative;box-shadow:0 4px 16px rgba(124,58,237,0.2)}
.date-badge::before{content:'';width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--c),var(--c2));flex-shrink:0;animation:pulse 2s infinite;box-shadow:0 0 12px rgba(6,182,212,0.5)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.4)}}

.hero h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.4rem,7vw,5rem);line-height:1.05;letter-spacing:-0.03em;color:#fff;max-width:1000px;margin:0 auto 28px;text-transform:uppercase;position:relative;z-index:2}
.hero h1 .acc{background:linear-gradient(90deg,var(--v3),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(1rem,2.2vw,1.25rem);color:var(--muted);max-width:700px;margin:0 auto 20px;line-height:1.9;position:relative;z-index:2}
.hero-sub strong{color:#eee;font-weight:600}
.hero-info{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:48px;position:relative;z-index:2}
.hi-pill{display:flex;align-items:center;gap:10px;background:rgba(13,10,26,0.8);border:1px solid var(--border);padding:14px 22px;border-radius:12px;font-size:0.9rem;color:#ddd;backdrop-filter:blur(10px);transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.hi-pill strong{color:#fff;font-weight:700}
.hi-pill:hover{background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.4);transform:translateY(-2px)}

.btn-main{display:inline-block;background:linear-gradient(135deg,var(--v),var(--v2));color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:0.06em;text-transform:uppercase;padding:24px 64px;border-radius:12px;text-decoration:none;transition:all 0.3s;box-shadow:0 8px 40px rgba(124,58,237,0.5);position:relative;overflow:hidden;z-index:2;min-height:64px;display:flex;align-items:center;justify-content:center}
.btn-main::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.25),rgba(255,255,255,0.1));opacity:0;transition:opacity 0.3s}
.btn-main:hover::before{opacity:1}
.btn-main:hover{opacity:0.98;transform:translateY(-4px);box-shadow:0 16px 56px rgba(124,58,237,0.7)}
.hero-trust{margin-top:24px;display:flex;flex-wrap:wrap;justify-content:center;gap:28px;font-size:0.85rem;color:#4a3f60;position:relative;z-index:2}
.hero-trust span{padding:8px 16px;background:rgba(124,58,237,0.1);border-radius:8px;border:1px solid rgba(124,58,237,0.2)}

.affiliate-disclosure{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:12px;padding:16px 24px;margin:24px auto 0;max-width:600px;font-size:0.85rem;color:var(--success);backdrop-filter:blur(10px)}
.affiliate-disclosure strong{color:#059669;font-weight:700}

.stats{background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0;justify-items:center}
.stat{text-align:center;padding:28px 24px;border-right:1px solid var(--border);width:100%}
.stat:last-child{border-right:none}
.stat strong{display:block;font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1;margin-bottom:8px}
.stat strong.v{background:linear-gradient(90deg,var(--v2),var(--v3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat strong.c{background:linear-gradient(90deg,var(--c),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat p{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;font-weight:600}

section{padding:100px 24px}
.container{max-width:1200px;margin:0 auto}
.sec-label{font-size:0.78rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--v3);margin-bottom:16px;display:block}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.05;letter-spacing:-0.02em;color:#fff;margin-bottom:20px;text-transform:uppercase}
.sec-title .a{background:linear-gradient(90deg,var(--v3),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sec-sub{font-size:1rem;color:var(--muted);line-height:1.9;max-width:600px;margin-bottom:60px}

/* SOBRE */
.sobre{background:var(--darker)}
.sobre-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.sobre-text p{font-size:1rem;color:#7B7394;line-height:1.95;margin-bottom:20px}
.sobre-text p strong{color:#ddd;font-weight:600}
.sobre-stats{display:flex;flex-direction:column;gap:16px}
.ss{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 32px;display:flex;align-items:center;gap:20px;transition:all 0.3s;backdrop-filter:blur(10px)}
.ss:hover{border-color:rgba(124,58,237,0.5);transform:translateX(8px);box-shadow:0 12px 40px rgba(124,58,237,0.15)}
.ss-num{font-family:'Syne',sans-serif;font-weight:800;font-size:2.5rem;background:linear-gradient(90deg,var(--v2),var(--c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;flex-shrink:0;min-width:100px}
.ss-label{font-size:0.92rem;color:var(--muted);line-height:1.6}
.ss-label strong{color:#eee;display:block;font-size:1rem;margin-bottom:4px}

/* PALCOS */
.palcos{background:var(--dark)}
.palcos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.palco{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;transition:all 0.3s;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.palco::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--v),var(--c));transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.palco:hover{transform:translateY(-8px);border-color:rgba(124,58,237,0.5);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.palco:hover::before{transform:scaleX(1)}
.palco-icon{font-size:3rem;margin-bottom:20px;display:block}
.palco h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em}
.palco p{font-size:0.92rem;color:#5a5070;line-height:1.75}

/* RESTO DO CSS MANTIDO E OTIMIZADO... (para não exceder limite, mantenho igual mas com melhorias de performance) */
.topicos,.quem,.ingressos,.local,.faq{background:var(--darker)}
.topics-grid,.quem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.topic,.qc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all 0.25s}
.topic:hover,.qc:hover{border-color:rgba(124,58,237,0.4);transform:translateY(-4px)}
.ing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:1200px;margin:0 auto}
.ing{background:var(--card);border:2px solid var(--border);border-radius:24px;padding:40px 32px;position:relative;overflow:hidden;text-align:left;transition:all 0.3s}
.ing.popular{border-color:var(--v);box-shadow:0 0 0 4px rgba(124,58,237,0.2)}
.ing.popular::after{content:'🔥 MAIS VENDIDO';position:absolute;top:20px;right:20px;background:linear-gradient(135deg,var(--v),var(--c));color:#fff;font-size:0.7rem;font-weight:800;letter-spacing:0
