<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --purple: #7C3AED; --purple-light: #A855F7; --purple-lighter: #C084FC;
  --cyan: #06B6D4; --cyan-light: #22D3EE;
  --dark: #0a0a0f; --darker: #030208; --card: #11101f; --text: #f8f7ff; --muted: #8b84a3;
  --border: rgba(124,58,237,0.2); --success: #10b981;
}
html { scroll-behavior: smooth; scroll-padding-top: 80px; }
body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); line-height: 1.6; overflow-x: hidden; }

.topbar { background: linear-gradient(90deg, var(--purple), var(--purple-light), var(--cyan)); padding: 12px 20px; text-align: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; color: white; letter-spacing: 0.05em; position: relative; }
.topbar::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shine 4s infinite; }
@keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }

nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 20px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 12px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: white; }
.logo span { color: var(--purple-lighter); font-size: 0.7rem; letter-spacing: 0.1em; display: block; }
.cta-nav { background: linear-gradient(135deg, var(--purple), var(--purple-light)); color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.05em; transition: all 0.3s; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.cta-nav:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.6); }

.hero { background: var(--darker); padding: 120px 20px 80px; text-align: center; position: relative; }
.hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), transparent); animation: slide 3s infinite; }
@keyframes slide { 0%, 100% { transform: scaleX(0); transform-origin: left; } 50% { transform: scaleX(1); transform-origin: center; } }

.hero-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4); color: var(--purple-lighter); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 12px 24px; border-radius: 50px; margin-bottom: 30px; }
.hero-badge::before { content: '📍'; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

.hero h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.5rem, 8vw, 5rem); line-height: 1.1; margin-bottom: 20px; letter-spacing: -0.02em; }
.hero h1 span { background: linear-gradient(90deg, var(--purple-lighter), var(--cyan-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-subtitle { font-size: clamp(1.1rem, 3vw, 1.4rem); color: var(--muted); max-width: 700px; margin: 0 auto 30px; line-height: 1.7; }
.hero-info { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 40px; font-size: 0.95rem; }
.hero-info span { background: rgba(17,16,31,0.8); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; }

.cta-hero { display: inline-block; background: linear-gradient(135deg, var(--purple), var(--purple-light)); color: white; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; padding: 22px 60px; border-radius: 12px; text-decoration: none; margin: 20px 10px; transition: all 0.3s; box-shadow: 0 10px 40px rgba(124,58,237,0.5); position: relative; overflow: hidden; }
.cta-hero::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.5s; }
.cta-hero:hover::before { left: 100%; }
.cta-hero:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(124,58,237,0.7); }

.disclosure { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); border-radius: 12px; padding: 16px 24px; margin: 30px auto 0; max-width: 700px; font-size: 0.9rem; color: var(--success); text-align: center; }
.disclosure strong { color: #059669; font-weight: 700; }

.stats { background: var(--card); padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; text-align: center; border-top: 1px solid var(--border); }
.stat h3 { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; margin-bottom: 8px; }
.stat h3.purple { background: linear-gradient(90deg, var(--purple-light), var(--purple-lighter)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat h3.cyan { background: linear-gradient(90deg, var(--cyan), var(--cyan-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat p { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }

section { padding: 90px 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.section-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.2rem, 5vw, 3.8rem); text-align: center; margin-bottom: 20px; letter-spacing: -0.02em; }
.section-title span { background: linear-gradient(90deg, var(--purple-lighter), var(--cyan-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.section-subtitle { text-align: center; font-size: 1.1rem; color: var(--muted); max-width: 700px; margin: 0 auto 50px; line-height: 1.8; }

.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
.about-text p { font-size: 1rem; color: #8b84a3; line-height: 1.8; margin-bottom: 20px; }
.about-stats { display: flex; flex-direction: column; gap: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; display: flex; gap: 20px; transition: all 0.3s; }
.stat-card:hover { border-color: rgba(124,58,237,0.5); transform: translateX(8px); }
.stat-num { font-family: 'Syne', sans-serif; font-size: 2.5rem; background: linear-gradient(90deg, var(--purple-light), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

@media (max-width: 768px) {
  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  nav { padding: 0 16px; }
  .hero { padding: 100px 16px 60px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 30px 16px; }
  section { padding: 60px 16px; }
}

.stages-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
.stage-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 32px; text-align: center; transition: all 0.3s; position: relative; overflow: hidden; }
.stage-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--purple), var(--cyan)); transform: scaleX(0); transition: transform 0.4s; }
.stage-card:hover { transform: translateY(-10px); border-color: rgba(124,58,237,0.6); }
.stage-card:hover::before { transform: scaleX(1); }
.stage-icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }
.stage-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 16px; color: white; }

.tickets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; max-width: 1200px; margin: 0 auto; }
.ticket-card { background: var(--card); border: 2px solid var(--border); border-radius: 24px; padding: 40px 32px; transition: all 0.3s; position: relative; overflow: hidden; text-align: center; }
.ticket-card.popular { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(124,58,237,0.2); }
.ticket-card.popular::before { content: '🔥 MAIS VENDIDO'; position: absolute; top: 20px; right: 20px; background: linear-gradient(135deg, var(--purple), var(--cyan)); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
.ticket-type { font-size: 0.8rem; font-weight: 700; color: var(--purple-lighter); letter-spacing: 0.1em; margin-bottom: 8px; }
.ticket-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; color: white; margin-bottom: 12px; }
.ticket-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 3rem; color: white; margin-bottom: 8px; }
.ticket-price .currency { font-size: 1.5rem; vertical-align: super; }
.ticket-features { margin: 24px 0; text-align: left; }
.feature { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; color: #8b84a3; margin-bottom: 8px; }
.feature::before { content: '✓'; color: var(--purple-lighter); font-weight: bold; font-size: 1.2rem; }
.cta-ticket { display: block; width: 100%; background: linear-gradient(135deg, var(--purple), var(--purple-light)); color: white; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; padding: 16px; border-radius: 12px; text-decoration: none; margin-top: 20px; transition: all 0.3s; }

.footer { background: #020205; border-top: 1px solid var(--border); padding: 50px 20px 30px; text-align: center; font-size: 0.85rem; color: #5a4f70; line-height: 1.8; }
.footer a { color: var(--purple); text-decoration: none; }

.fade-in { opacity: 0; transform: translateY(40px); transition: all 0.8s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
